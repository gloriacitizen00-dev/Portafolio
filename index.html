<style>
body {
  margin:0;
  font-family:'New Amsterdam', serif; /* Fuente aplicada */
  color:#c58cff; /* violeta claro */
  text-align:center;
  overflow:auto;
  background:black;
}

#stars {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.console {
  margin-top:40px;
  padding:25px;
  width:460px;

  border-radius:14px;

  margin-right:auto;

h1 { color:#c58cff;font-size:2.2em}

.message {
  font-size:1.6em;
  margin-bottom:15px;
  color:#c58cff;
}

  .banner {
  width:100%;
  max-width:420px;
  border-radius:12px;
  margin:15px auto;
  box-shadow:0 0 25px rgba(197,140,255,0.6);
}

.data {
  margin-top:10px;
  color:#c58cff;
  font-size:1.2em;
}

.subtitle {
  font-size:1.8em;
  color:#c58cff; /* violeta claro */
  font-family:'Pirata One', cursive; /* fuente con aire místico */
  margin-top:-10px;
  margin-bottom:20px;
  text-shadow:0 0 8px rgba(197,140,255,0.6);
}

.earth {
  filter: brightness(1.5) contrast(1.3) saturate(1.4) drop-shadow(0 0 15px #66fcf1);
}

.planet-item {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.label {
  margin-top: 8px;
  font-size: 0.85em;
  color: #c58cff;
  text-shadow: 0 0 5px rgba(102,252,241,0.6);
}

.planet-box {
  display: grid;
  grid-template-columns: repeat(2, 80px);
  grid-gap: 20px;
  background: rgba(20,30,40,0.7);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px #45a29e;
  text-align: center;
  color: #66fcf1;
  font-size: 0.9em;
}

.planet {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  margin: auto;
  box-shadow: inset -5px -5px 10px rgba(0,0,0,0.4),
              inset 5px 5px 10px rgba(255,255,255,0.2),
              0 0 15px rgba(102,252,241,0.4);
}

.earth-planets {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 40px;
  margin-top: 30px;
}


.bar {
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill {
  height:100%;
  background:#c58cff;
  width:0%;
  transition:width 1s;
}

.footer {
  margin-top:25px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.footer a {
  text-decoration:none;
}

.footer button {
  padding:10px 16px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  font-size:1.1em;
}

.footer button:hover {
  background:rgba(102,252,241,0.3);
}

.btn-facebook {
  display:inline-block;
  background-color:#c58cff; /* violeta claro */
  color:#fff;
  font-size:1.1em;
  font-weight:bold;
  padding:10px 20px;
  text-decoration:none;
  border-radius:8px;
  transition:background-color 0.3s ease;
}
.btn-facebook:hover {
  background-color:#a86fe0;
}
</style>

<body>

<canvas id="stars"></canvas>

<div class="console">
  <h1>Cosmic Console</h1>
  <h2 class="subtitle">Northern Lights Console</h2>
  <img src="northern%20lights.PNG" alt="Northern Lights" class="banner">
  <p class="message" id="oracleMessage">Scanning cosmic environment...</p>
  <div class="data" id="oracleData">Loading space weather...</div>

  <div class="data">Solar Wind Speed</div>
  <div class="bar"><div id="speedBar" class="fill"></div></div>
</div>

<div class="earth-planets">
  <img class="earth"
       src="https://cdn.star.nesdis.noaa.gov/GOES16/ABI/FD/GEOCOLOR/latest.jpg"
       width="300"
       style="margin-top:10px;border-radius:10px;">
</div>
</div>
<script>
// STARFIELD
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const stars = [];
for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5
  });
}

function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(star => {
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
    ctx.fill();
    star.y += 0.1;
    if (star.y > canvas.height) star.y = 0;
  });

  requestAnimationFrame(drawStars);
}
drawStars();

// SPACE WEATHER (SIMPLIFIED)
async function loadSpaceWeather() {
  try {
    const response = await fetch("https://services.swpc.noaa.gov/products/solar-wind/plasma-1-day.json");

    if (!response.ok) throw new Error("Fetch failed");

    const data = await response.json();

    let speed = 0;
    let density = 0;

    for (let i = data.length - 1; i > 0; i--) {
      const d = parseFloat(data[i][1]);
      const s = parseFloat(data[i][2]);

      if (!isNaN(d) && !isNaN(s)) {
        density = d;
        speed = s;
        break;
      }
    }

    document.getElementById("oracleMessage").textContent = "✨ Space weather online";

    document.getElementById("oracleData").innerHTML =
      `Solar Wind Speed: ${speed} km/s<br>
       Plasma Density: ${density} p/cm³`;

    document.getElementById("speedBar").style.width =
      Math.min(100, speed / 10) + "%";

  } catch (error) {
    document.getElementById("oracleMessage").textContent = "❌ Unable to load data";
    document.getElementById("oracleData").textContent = error.message;
  }
}

// Run
loadSpaceWeather();
setInterval(loadSpaceWeather, 300000);
</script>
