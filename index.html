<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkyCortex</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Cinzel', serif;
  background: radial-gradient(circle at top, #fff, #f3f3f3);
  color:#111;
}

/* =========================
   TOP BAR
========================= */
.sc-topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(212,175,55,0.3);
  z-index:10000;
}

.sc-brand{
  color:#d4af37;
  letter-spacing:2px;
  font-weight:bold;
}

.sc-btn{
  border:1px solid #d4af37;
  background:none;
  color:#d4af37;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.sc-btn:hover{
  background:#d4af37;
  color:white;
}

/* =========================
   OVERLAY
========================= */
.sc-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:9998;
}

/* =========================
   MENU PANEL
========================= */
.sc-panel{
  position:fixed;
  top:80px;
  right:20px;
  width:320px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(15px);
  border:1px solid rgba(212,175,55,0.4);
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
  padding:20px;
  display:none;
  z-index:9999;
}

/* VIEWS */
.view{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.hidden{
  display:none;
}

/* ITEMS */
.item, .link, .back{
  background:none;
  border:none;
  text-align:left;
  padding:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
  color:#111;
}

.item:hover,
.link:hover{
  color:#d4af37;
  transform:translateX(5px);
}

.back{
  color:#d4af37;
  font-weight:bold;
}

/* =========================
   MAIN CONTENT (demo)
========================= */
main{
  padding:120px 20px;
  text-align:center;
}

h1{
  color:#d4af37;
  font-size:3rem;
}
p{
  margin-top:10px;
  opacity:0.7;
}

/* MOBILE */
@media(max-width:600px){
  .sc-panel{
    width:90%;
    right:5%;
  }
}
</style>
</head>

<body>

<!-- =========================
     TOP BAR
========================= -->
<div class="sc-topbar">
  <div class="sc-brand">SKY CORTEX</div>
  <button class="sc-btn" onclick="toggleMenu()">☰ MENU</button>
</div>

<!-- OVERLAY -->
<div class="sc-overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="sc-panel" id="panel">

  <!-- MAIN -->
  <div class="view" id="mainView">
    <button class="item" onclick="openView('workspace')">WORKSPACE ▸</button>
    <button class="item" onclick="openView('gallery')">GALLERY ▸</button>
    <button class="item" onclick="openView('studio')">STUDIO ▸</button>
    <button class="item" onclick="openView('costa')">COSTA RICA ▸</button>
    <button class="item" onclick="openView('news')">NEWS ▸</button>
    <button class="item" onclick="openView('about')">ABOUT</button>
  </div>

  <!-- WORKSPACE -->
  <div class="view hidden" id="workspace">
    <button class="back" onclick="back()">← BACK</button>
    <a class="link" href="#">Play the Game 🎮</a>
  </div>

  <!-- GALLERY -->
  <div class="view hidden" id="gallery">
    <button class="back" onclick="back()">← BACK</button>
    <a class="link" href="#">Generative Art</a>
    <a class="link" href="#">Experimental Interfaces</a>
    <a class="link" href="#">Python Visuals</a>
  </div>

  <!-- STUDIO -->
  <div class="view hidden" id="studio">
    <button class="back" onclick="back()">← BACK</button>
    <a class="link" href="#">Original Storybook</a>
  </div>

  <!-- COSTA RICA -->
  <div class="view hidden" id="costa">
    <button class="back" onclick="back()">← BACK</button>
    <a class="link" href="#">Macramé</a>
    <a class="link" href="#">Atlas Costa Rica</a>
  </div>

  <!-- NEWS -->
  <div class="view hidden" id="news">
    <button class="back" onclick="back()">← BACK</button>
    <a class="link" href="#">Updates</a>
    <a class="link" href="#">Releases</a>
    <a class="link" href="#">New Projects</a>
  </div>

  <!-- ABOUT -->
  <div class="view hidden" id="about">
    <button class="back" onclick="back()">← BACK</button>
    <a class="link" href="#">About SkyCortex</a>
    <a class="link" href="#">Gloria Martínez</a>
  </div>

</div>

<!-- =========================
     MAIN CONTENT (example)
========================= -->
<main>
  <h1>SkyCortex</h1>
  <p>Creative Digital Lab · Interactive Systems · Generative Art</p>
</main>

<!-- =========================
     JS
========================= -->
<script>
const panel = document.getElementById("panel");
const overlay = document.getElementById("overlay");
const mainView = document.getElementById("mainView");

function toggleMenu(){
  const open = panel.style.display === "block";
  panel.style.display = open ? "none" : "block";
  overlay.style.display = open ? "none" : "block";
  showMain();
}

function closeMenu(){
  panel.style.display = "none";
  overlay.style.display = "none";
}

function openView(id){
  document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

function back(){
  document.querySelectorAll(".view").forEach(v => v.classList.add("hidden"));
  mainView.classList.remove("hidden");
}

document.addEventListener("keydown", e=>{
  if(e.key === "Escape") closeMenu();
});
</script>

</body>
</html>
